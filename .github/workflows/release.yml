name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version env
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build release asset
        run: |
          set -euo pipefail

          sed -i -E "s/^__version__ = \".*\"/__version__ = \"${VERSION}\"/" _version.py

          mkdir -p dist/keyd_manager/assets
          cp main.py _version.py install.sh keyd_manager dist/keyd_manager/
          cp assets/keyd.config dist/keyd_manager/assets/
          chmod 755 dist/keyd_manager/keyd_manager

          tar -C dist -czf keyd_manager-linux-x64.tar.gz keyd_manager

          ls -lah
          test -f keyd_manager-linux-x64.tar.gz

      - name: Create release and upload asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${TAG}" "${GITHUB_WORKSPACE}/keyd_manager-linux-x64.tar.gz" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --generate-notes
